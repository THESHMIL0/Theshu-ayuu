<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayuu 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #ffe6f2 0%, #ffb3d9 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            text-align: center;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>💖</text></svg>"), auto;
            transition: background 1s ease; 
        }

        body.starlight-mode { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffe6f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .loader-heart { font-size: 5rem; animation: gentlePulse 1s infinite alternate; }
        .loader-text { color: #ff4d94; font-weight: bold; margin-top: 20px; font-size: 1.2rem; }

        /* 3D Envelope */
        #envelope-container {
            position: fixed;
            z-index: 50;
            cursor: pointer;
            transition: opacity 1s ease, transform 1s ease;
        }
        .envelope {
            width: 300px; height: 200px;
            background: #ff4d94;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 1.5rem;
            animation: floatEnv 3s infinite ease-in-out;
            border: 4px solid #fff;
        }
        .envelope::after {
            content: "Tap to Open 💌";
            position: absolute;
        }
        .envelope:hover { transform: scale(1.05); }

        /* Main Card Container (Clean Frosted Glass) */
        .card-container {
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
            
            padding: 40px;
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative;
            scroll-behavior: smooth;
            width: 420px;
            max-width: 85%;
            box-sizing: border-box; 
            
            display: none; 
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
            
            /* Hide scrollbar visually but keep scrolling active */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        
        .card-container::-webkit-scrollbar {
            display: none;
        }

        body.starlight-mode .card-container { background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(20px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); color: #e6e6e6; }
        body.starlight-mode p { color: #ccc; }

        /* Elegant Title */
        h1 { 
            color: #fff; 
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(255, 77, 148, 0.4); 
            animation: gentlePulse 2s infinite alternate;
        }

        p { color: #666; font-size: 1.15rem; line-height: 1.6; margin-bottom: 12px; min-height: 25px; }

        button {
            background-color: #ff4d94; color: white; border: none; padding: 10px 25px;
            font-size: 1.1rem; border-radius: 50px; transition: all 0.3s ease; margin-top: 10px;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🐾</text></svg>"), pointer;
        }
        button:hover { background-color: #ff1a75; transform: scale(1.05); }
        .theme-btn { position: absolute; top: 15px; right: 15px; background: none; font-size: 1.5rem; padding: 5px; }

        /* UPGRADED: Single Photo Styling (Borderless & Sleek) */
        .photo-container { 
            position: relative; 
            width: 90%; 
            margin: 0 auto 25px auto; 
            overflow: hidden; 
            border-radius: 15px; /* Clean, modern rounded corners */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Deep, soft shadow */
        }

        .love-photo {
            width: 100%; 
            display: block; 
            transform: scale(1.1) translateX(0);
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        /* Timeline of Us */
        .timeline {
            border-left: 4px solid #ff4d94;
            margin: 25px 0 25px 20px;
            padding-left: 15px;
            text-align: left;
        }
        .time-item { margin-bottom: 15px; position: relative; font-size: 1.1rem; color: #555; }
        body.starlight-mode .time-item { color: #ccc; }
        .time-item::before {
            content: "💖"; position: absolute; left: -28px; top: -2px; font-size: 1rem;
            background: rgba(255,255,255,0.8); border-radius: 50%; padding: 2px;
        }
        body.starlight-mode .time-item::before { background: #1a1a2e; }

        .highlight { color: #ff4d94; font-weight: 700; font-size: 1.25rem; text-shadow: 0 0 5px rgba(255, 77, 148, 0.15); }
        .music-player-container { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #ffb3d9; display: flex; flex-direction: column; align-items: center; }
        audio { height: 35px; border-radius: 20px; outline: none; margin-bottom: 10px; opacity: 0.8;}
        
        #timerBox { background: rgba(255, 230, 242, 0.7); color: #ff4d94; padding: 12px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; border: 1px dashed #ff4d94; font-size: 1.1rem;}
        body.starlight-mode #timerBox { background: rgba(44, 83, 100, 0.7); color: #ffb3d9; border-color: #ffb3d9;}

        /* Floating Bubbles */
        .bubble {
            position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; border: 1px solid rgba(255, 77, 148, 0.2);
            animation: floatUpBubbles 8s infinite ease-in; pointer-events: none; z-index: 1;
        }

        /* Animations */
        @keyframes gentlePulse { from { transform: scale(1); } to { transform: scale(1.03); } }
        @keyframes floatEnv { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatUpBubbles { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }
        @keyframes kenBurns {
            0% { transform: scale(1.1) translateX(0%) translateY(0%); }
            100% { transform: scale(1.25) translateX(-2%) translateY(-1%); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-heart">💖</div>
        <div class="loader-text">Loading love for Ayuu...</div>
    </div>

    <div id="envelope-container" onclick="openEnvelope()">
        <div class="envelope"></div>
    </div>

    <div class="card-container" id="mainCard">
        <button class="theme-btn" onclick="toggleTheme()" title="Switch Theme">🌙</button>

        <h1>Hi Ayuu</h1>
        
        <div class="photo-container">
            <img src="image_0.jpg" alt="Ayuu and me" class="love-photo" id="mainPhoto">
        </div>

        <div id="timerBox">
            Every second with you counts:<br><span id="timeDisplay">Calculating...</span>
        </div>

        <p id="typeLine1"></p>
        <p id="typeLine2" class="highlight"></p>
        <p id="typeLine3"></p>
        <p id="typeLine4"></p>
        <p id="typeLine5"></p>
        <p id="typeLine6" class="highlight"></p>

        <div class="timeline">
            <div class="time-item"><b>Jan 14, 2026:</b> The day my world got infinitely brighter ✨</div>
            <div class="time-item"><b>Today:</b> Still completely, hopelessly obsessed with you 🥰</div>
            <div class="time-item"><b>Forever:</b> I'm never letting you go 🗽</div>
        </div>
        
        <button class="reason-btn" onclick="generateReason()">Tell me why you love me 🌸</button>
        <p id="reasonDisplay"></p>

        <div class="music-player-container">
            <p style="font-size: 0.95rem; margin: 0 0 5px 0; color: #ff4d94; font-weight: bold;">🎵 Our Song</p>
            <audio id="bgMusic" controls loop>
                <source src="song1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 2000);

            startTimer();
            createBubbles();
        };

        function openEnvelope() {
            // Request Full Screen Mode
            let docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log("Fullscreen prevented:", err));
            } else if (docElm.webkitRequestFullscreen) { 
                docElm.webkitRequestFullscreen();
            }

            // Play music
            let music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio prevented."));

            // Animate envelope away
            const env = document.getElementById('envelope-container');
            env.style.transform = 'scale(1.5) translateY(-50px)';
            env.style.opacity = '0';
            
            setTimeout(() => {
                env.style.display = 'none';
                
                const card = document.getElementById('mainCard');
                card.style.display = 'block';
                
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                    startTypewriter(); 
                }, 50);
            }, 800);
        }

        // --- UPGRADED: Longer Typewriter Logic ---
        const text1 = "I know things feel hard right now, and sometimes you feel lonely.";
        const text2 = "But I want you to know: I am right here, and I am not going anywhere.";
        const text3 = "Every single day with you is a blessing. You make my world so incredibly bright.";
        const text4 = "Your smile is my absolute favorite thing to see, and your laugh is my favorite sound.";
        const text5 = "Even when we are apart, you are always on my mind and taking up all the space in my heart.";
        const text6 = "I love you so much. You are never alone as long as I'm around! 🗽💖";

        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            document.getElementById(elementId).innerHTML = "";

            function type() {
                if (i < text.length) {
                    document.getElementById(elementId).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, 400); // Short pause before next line
                }
            }
            type();
        }

        function startTypewriter() {
            // Chaining all 6 lines together! Speed increased to 35 so it's not too slow.
            typeWriter("typeLine1", text1, 35, () => {
                typeWriter("typeLine2", text2, 35, () => {
                    typeWriter("typeLine3", text3, 35, () => {
                        typeWriter("typeLine4", text4, 35, () => {
                            typeWriter("typeLine5", text5, 35, () => {
                                typeWriter("typeLine6", text6, 35, null);
                            });
                        });
                    });
                });
            });
        }

        // --- Timer Logic (January 14, 2026) ---
        function startTimer() {
            const startDate = new Date("2026-01-14T00:00:00").getTime(); 
            setInterval(function() {
                const now = new Date().getTime();
                const distance = now - startDate;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById("timeDisplay").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            }, 1000);
        }

        // --- Floating Bubbles Generator ---
        function createBubbles() {
            for(let i = 0; i < 20; i++) {
                let bubble = document.createElement('div');
                bubble.classList.add('bubble');
                bubble.style.width = Math.random() * 30 + 10 + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                document.body.appendChild(bubble);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('starlight-mode');
            const btn = document.querySelector('.theme-btn');
            if(document.body.classList.contains('starlight-mode')) { btn.innerText = '☀️'; } else { btn.innerText = '🌙'; }
        }

        const reasons = [
            "You have the most beautiful smile. ✨",
            "I love our late-night talks. 🌙",
            "You make my world so bright. ☀️",
            "Your laugh is my favorite sound. 🎶",
            "Every moment with you is an adventure. 🗽",
            "You are the strongest person I know. 💪",
            "I could get lost in your eyes forever. 🥺",
            "You are my literal dream come true! 💖"
        ];

        function generateReason() {
            const display = document.getElementById('reasonDisplay');
            const randomIndex = Math.floor(Math.random() * reasons.length);
            display.innerText = reasons[randomIndex];
            display.style.transform = 'scale(1.1)';
            setTimeout(() => { display.style.transform = 'scale(1)'; }, 200);
        }
    </script>
</body>
</html>
