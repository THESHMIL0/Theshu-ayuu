<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayuu 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Upgraded to a beautiful pastel gradient */
            background: linear-gradient(135deg, #ffe6f2 0%, #ffb3d9 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            text-align: center;
        }

        .card-container {
            background: white;
            padding: 40px;
            border-radius: 25px; /* Softer, rounder corners */
            /* Upgraded to a soft pink glowing shadow */
            box-shadow: 0 15px 35px rgba(255, 77, 148, 0.3);
            z-index: 10;
            max-width: 85%;
            width: 420px;
        }

        h1 { 
            color: #ff4d94; 
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(255, 77, 148, 0.1);
        }

        p { 
            color: #666; 
            font-size: 1.25rem; 
            line-height: 1.6;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            /* Added a continuous pulse animation */
            animation: pulse 2s infinite;
        }

        button:hover {
            background-color: #ff1a75;
            transform: scale(1.1);
            animation: none; /* Stops pulsing when she hovers over it */
        }

        /* The hidden message styling */
        #secretMessage {
            display: none; 
            opacity: 0;
            transition: opacity 1.5s ease-in; 
            margin-top: 20px;
        }

        .highlight {
            color: #ff4d94;
            font-weight: 700;
            font-size: 1.4rem;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 148, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 77, 148, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 148, 0); }
        }

        /* New dynamic falling emojis */
        .falling-emoji {
            position: absolute;
            z-index: 1;
            top: -10vh;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <h1>Hi Ayuu 💖</h1>
        <p id="introText">I coded a little something just for you...</p>
        
        <button id="revealBtn" onclick="revealMessage()">Click Me 😸</button>

        <div id="secretMessage">
            <p>I know things feel hard right now, and sometimes you feel lonely.</p>
            <p class="highlight">But I want you to know: I am right here, and I am not going anywhere.</p>
            <p>I love you so much. You are never alone as long as I'm around! 🗽💖</p>
        </div>
    </div>

    <script>
        function revealMessage() {
            // Reveal the message
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('introText').style.display = 'none';
            
            const msg = document.getElementById('secretMessage');
            msg.style.display = 'block';
            
            setTimeout(() => {
                msg.style.opacity = 1;
            }, 50);

            // Trigger the magical emoji shower!
            createEmojiShower();
        }

        function createEmojiShower() {
            const emojis = ['💖', '😸', '🗽', '✨', '🌸']; // The cute symbols!
            
            // Loop to create 50 falling elements
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.classList.add('falling-emoji');
                    // Pick a random emoji from our list
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    // Randomize the starting position across the width of the screen
                    el.style.left = Math.random() * 100 + 'vw';
                    
                    // Randomize the size of the emojis
                    el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    
                    // Randomize the falling speed between 3 and 6 seconds
                    el.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    
                    document.body.appendChild(el);
                    
                    // Clean up the emoji after it falls off screen so the browser doesn't lag
                    setTimeout(() => {
                        el.remove();
                    }, 6000);
                }, i * 100); // Staggers them so they don't fall all at once
            }
        }
    </script>
</body>
</html>
