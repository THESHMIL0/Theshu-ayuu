<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayuu 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles & Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #ffe6f2; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ff4d94; border-radius: 10px; }

        body {
            background: linear-gradient(135deg, #ffe6f2 0%, #ffb3d9 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            text-align: center;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>💖</text></svg>"), auto;
            transition: background 1s ease; 
        }

        body.starlight-mode { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffe6f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .loader-heart { font-size: 5rem; animation: gentlePulse 1s infinite alternate; }
        .loader-text { color: #ff4d94; font-weight: bold; margin-top: 20px; font-size: 1.2rem; }

        /* 3D Envelope */
        #envelope-container {
            position: fixed;
            z-index: 50;
            cursor: pointer;
            transition: opacity 1s ease, transform 1s ease;
        }
        .envelope {
            width: 300px; height: 200px;
            background: #ff4d94;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 1.5rem;
            animation: floatEnv 3s infinite ease-in-out;
            border: 4px solid #fff;
        }
        .envelope::after {
            content: "Tap to Open 💌";
            position: absolute;
        }
        .envelope:hover { transform: scale(1.05); }

        /* Main Card Container */
        .card-container {
            background: white;
            padding: 40px;
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(255, 77, 148, 0.3);
            z-index: 10;
            max-width: 85%;
            width: 420px;
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative;
            display: none; 
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
            /* Scroll smooth logic */
            scroll-behavior: smooth;
        }
        body.starlight-mode .card-container { background: #1a1a2e; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); color: #e6e6e6; }
        body.starlight-mode p { color: #ccc; }

        /* Neon Glow Name */
        h1 { 
            color: #fff; 
            font-size: 3rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #ffb3d9, 0 0 20px #ff4d94, 0 0 30px #ff1a75;
            animation: gentlePulse 2s infinite alternate;
        }

        p { color: #666; font-size: 1.25rem; line-height: 1.6; margin-bottom: 10px; min-height: 30px; }

        button {
            background-color: #ff4d94; color: white; border: none; padding: 10px 25px;
            font-size: 1.1rem; border-radius: 50px; transition: all 0.3s ease; margin-top: 10px;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🐾</text></svg>"), pointer;
        }
        button:hover { background-color: #ff1a75; transform: scale(1.05); }
        .theme-btn { position: absolute; top: 15px; right: 15px; background: none; font-size: 1.5rem; padding: 5px; }

        /* Photo Slideshow */
        .slideshow-container { position: relative; width: 85%; margin: 0 auto 20px auto; }
        .love-photo {
            width: 100%; border: 8px solid white; border-bottom: 25px solid white; 
            border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: block; transition: all 0.4s ease;
        }
        .prev-btn, .next-btn {
            position: absolute; top: 40%; background: rgba(255, 77, 148, 0.8);
            color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%;
            font-size: 1rem; transform: translateY(-50%); width: 40px; height: 40px;
        }
        .prev-btn { left: -15px; }
        .next-btn { right: -15px; }

        /* Timeline of Us */
        .timeline {
            border-left: 4px solid #ff4d94;
            margin: 20px 0 20px 20px;
            padding-left: 15px;
            text-align: left;
        }
        .time-item { margin-bottom: 15px; position: relative; font-size: 1.1rem; color: #555; }
        body.starlight-mode .time-item { color: #ccc; }
        .time-item::before {
            content: "💖"; position: absolute; left: -28px; top: -2px; font-size: 1rem;
            background: white; border-radius: 50%; padding: 2px;
        }
        body.starlight-mode .time-item::before { background: #1a1a2e; }

        .highlight { color: #ff4d94; font-weight: 700; font-size: 1.3rem; }
        .music-player-container { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #ffb3d9; display: flex; flex-direction: column; align-items: center; }
        audio { height: 35px; border-radius: 20px; outline: none; margin-bottom: 10px; }
        
        #timerBox { background: #ffe6f2; color: #ff4d94; padding: 10px; border-radius: 15px; font-weight: bold; margin-bottom: 15px; border: 1px dashed #ff4d94; }
        body.starlight-mode #timerBox { background: #2c5364; color: #ffb3d9; border-color: #ffb3d9;}

        /* Floating Bubbles */
        .bubble {
            position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.5);
            border-radius: 50%; border: 1px solid rgba(255, 77, 148, 0.3);
            animation: floatUpBubbles 8s infinite ease-in; pointer-events: none; z-index: 1;
        }

        /* Animations */
        @keyframes gentlePulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes floatEnv { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatUpBubbles { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-heart">💖</div>
        <div class="loader-text">Loading love for Ayuu...</div>
    </div>

    <div id="envelope-container" onclick="openEnvelope()">
        <div class="envelope"></div>
    </div>

    <div class="card-container" id="mainCard">
        <button class="theme-btn" onclick="toggleTheme()" title="Switch Theme">🌙</button>

        <h1>Hi Ayuu</h1>
        
        <div class="slideshow-container">
            <button class="prev-btn" onclick="changeSlide(-1)">❮</button>
            <img src="image_0.jpg" alt="Ayuu and me" class="love-photo" id="slideImg">
            <button class="next-btn" onclick="changeSlide(1)">❯</button>
        </div>

        <div id="timerBox">
            Time Together:<br><span id="timeDisplay">Calculating...</span>
        </div>

        <p id="typeLine1"></p>
        <p id="typeLine2" class="highlight"></p>
        <p id="typeLine3"></p>

        <div class="timeline">
            <div class="time-item"><b>Jan 14, 2026:</b> The day my world got brighter ✨</div>
            <div class="time-item"><b>Today:</b> Still completely obsessed with you 🥰</div>
            <div class="time-item"><b>Forever:</b> Never letting you go 🗽</div>
        </div>
        
        <button class="reason-btn" onclick="generateReason()">Tell me why you love me 🌸</button>
        <p id="reasonDisplay"></p>

        <div class="music-player-container">
            <p style="font-size: 0.9rem; margin: 0 0 5px 0;">🎵 Our Song</p>
            <audio id="bgMusic" controls loop>
                <source src="song1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 2000);

            startTimer();
            createBubbles();
        };

        function openEnvelope() {
            // NEW FEATURE: Request Full Screen Mode!
            let docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log("Fullscreen prevented:", err));
            } else if (docElm.webkitRequestFullscreen) { /* Safari/iOS */
                docElm.webkitRequestFullscreen();
            }

            // Play music
            let music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio prevented."));

            // Animate envelope away
            const env = document.getElementById('envelope-container');
            env.style.transform = 'scale(1.5) translateY(-50px)';
            env.style.opacity = '0';
            
            setTimeout(() => {
                env.style.display = 'none';
                // Show the main card
                const card = document.getElementById('mainCard');
                card.style.display = 'block';
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                    startTypewriter(); // Trigger typing effect!
                }, 50);
            }, 800);
        }

        // --- Typewriter & Auto-Scroll Logic ---
        const text1 = "I know things feel hard right now, and sometimes you feel lonely.";
        const text2 = "But I want you to know: I am right here, and I am not going anywhere.";
        const text3 = "I love you so much. You are never alone as long as I'm around! 🗽💖";

        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            document.getElementById(elementId).innerHTML = "";
            let card = document.getElementById('mainCard'); // We target the scrollable card

            function type() {
                if (i < text.length) {
                    document.getElementById(elementId).innerHTML += text.charAt(i);
                    i++;
                    
                    // NEW FEATURE: Auto-scroll to the bottom of the card as it types!
                    card.scrollTop = card.scrollHeight;
                    
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, 500); 
                }
            }
            type();
        }

        function startTypewriter() {
            typeWriter("typeLine1", text1, 40, () => {
                typeWriter("typeLine2", text2, 40, () => {
                    typeWriter("typeLine3", text3, 40, null);
                });
            });
        }

        // --- Slideshow Logic ---
        const images = ["image_0.jpg", "image_1.jpg", "image_2.jpg"];
        let currentImgIndex = 0;

        function changeSlide(direction) {
            currentImgIndex += direction;
            if (currentImgIndex >= images.length) currentImgIndex = 0;
            if (currentImgIndex < 0) currentImgIndex = images.length - 1;
            document.getElementById('slideImg').src = images[currentImgIndex];
        }

        // --- Timer Logic (January 14, 2026) ---
        function startTimer() {
            const startDate = new Date("2026-01-14T00:00:00").getTime(); 
            setInterval(function() {
                const now = new Date().getTime();
                const distance = now - startDate;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById("timeDisplay").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            }, 1000);
        }

        // --- Floating Bubbles Generator ---
        function createBubbles() {
            for(let i = 0; i < 20; i++) {
                let bubble = document.createElement('div');
                bubble.classList.add('bubble');
                bubble.style.width = Math.random() * 30 + 10 + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                document.body.appendChild(bubble);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('starlight-mode');
            const btn = document.querySelector('.theme-btn');
            if(document.body.classList.contains('starlight-mode')) { btn.innerText = '☀️'; } else { btn.innerText = '🌙'; }
        }

        const reasons = [
            "You have the most beautiful smile. ✨",
            "I love our late-night talks. 🌙",
            "You make my world so bright. ☀️",
            "Your laugh is my favorite sound. 🎶",
            "Every moment with you is an adventure. 🗽"
        ];

        function generateReason() {
            const display = document.getElementById('reasonDisplay');
            const randomIndex = Math.floor(Math.random() * reasons.length);
            display.innerText = reasons[randomIndex];
            display.style.transform = 'scale(1.1)';
            setTimeout(() => { display.style.transform = 'scale(1)'; }, 200);
        }
    </script>
</body>
</html>
