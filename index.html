<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayuu 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #ffe6f2 0%, #ffb3d9 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            text-align: center;
            /* 1. Custom Heart Cursor for the whole page */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>💖</text></svg>"), auto;
        }

        .card-container {
            background: white;
            padding: 40px;
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(255, 77, 148, 0.3);
            z-index: 10;
            max-width: 85%;
            width: 420px;
            max-height: 90vh; /* Prevents card from getting too tall */
            overflow-y: auto; /* Adds a scrollbar inside the card if needed */
        }

        h1 { 
            color: #ff4d94; 
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(255, 77, 148, 0.1);
        }

        p { 
            color: #666; 
            font-size: 1.25rem; 
            line-height: 1.6;
            margin-bottom: 10px;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            /* Custom Cat Paw Cursor for buttons */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🐾</text></svg>"), pointer;
        }

        #revealBtn {
            animation: pulse 2s infinite;
        }

        #revealBtn:hover {
            background-color: #ff1a75;
            transform: scale(1.1);
            animation: none; 
        }

        /* Styling for the new Generator Button */
        .reason-btn {
            background-color: white;
            color: #ff4d94;
            border: 2px solid #ff4d94;
            padding: 10px 20px;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .reason-btn:hover {
            background-color: #ffe6f2;
            transform: scale(1.05);
        }

        /* The animated text for the reasons */
        #reasonDisplay {
            color: #ff4d94;
            font-weight: bold;
            font-style: italic;
            margin-top: 15px;
            min-height: 30px; 
            transition: transform 0.2s ease;
        }

        #secretContent {
            display: none; 
            margin-top: 20px;
        }

        .love-gif {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .fade-line {
            opacity: 0;
            transform: translateY(10px); 
            transition: opacity 1s ease-out, transform 1s ease-out; 
        }

        .highlight {
            color: #ff4d94;
            font-weight: 700;
            font-size: 1.4rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 148, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 77, 148, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 148, 0); }
        }

        .falling-emoji {
            position: absolute;
            z-index: 1;
            top: -10vh;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="song1.mp3" type="audio/mpeg">
    </audio>

    <div class="card-container">
        <h1>Hi Ayuu 💖</h1>
        <p id="introText">I coded a little something just for you...</p>
        
        <button id="revealBtn" onclick="revealMessage()">Click Me 😸</button>

        <div id="secretContent">
            <img src="https://media.giphy.com/media/VbAFrRPOPGuMTZrpR1/giphy.gif" alt="Cute Hug" class="love-gif fade-line" id="line1">
            
            <p class="fade-line" id="line2">I know things feel hard right now, and sometimes you feel lonely.</p>
            <p class="fade-line highlight" id="line3">But I want you to know: I am right here, and I am not going anywhere.</p>
            <p class="fade-line" id="line4">I love you so much. You are never alone as long as I'm around! 🗽💖</p>
            
            <div class="fade-line" id="line5">
                <button class="reason-btn" onclick="generateReason()">Tell me why you love me 🌸</button>
                <p id="reasonDisplay"></p>
            </div>
        </div>
    </div>

    <script>
        function revealMessage() {
            // Play the background music!
            document.getElementById('bgMusic').play();

            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('introText').style.display = 'none';
            document.getElementById('secretContent').style.display = 'block';
            
            setTimeout(() => { document.getElementById('line1').style.opacity = '1'; document.getElementById('line1').style.transform = 'translateY(0)'; }, 100);
            setTimeout(() => { document.getElementById('line2').style.opacity = '1'; document.getElementById('line2').style.transform = 'translateY(0)'; }, 1500);
            setTimeout(() => { document.getElementById('line3').style.opacity = '1'; document.getElementById('line3').style.transform = 'translateY(0)'; }, 3500);
            setTimeout(() => { document.getElementById('line4').style.opacity = '1'; document.getElementById('line4').style.transform = 'translateY(0)'; }, 5500);
            
            // Fades in the generator button last
            setTimeout(() => { document.getElementById('line5').style.opacity = '1'; document.getElementById('line5').style.transform = 'translateY(0)'; }, 7000);

            createEmojiShower();
        }

        // --- JavaScript for the Reason Generator ---
        const reasons = [
            "You have the most beautiful smile. ✨",
            "I love our late-night talks. 🌙",
            "You make my world so bright. ☀️",
            "Your laugh is my favorite sound. 🎶",
            "You have the kindest heart. 💖",
            "Every moment with you is an adventure. 🗽",
            "You understand me like no one else. 😸",
            "You are stronger than you know. 💪",
            "You are my favorite person in the world! 🥰"
        ];

        function generateReason() {
            const display = document.getElementById('reasonDisplay');
            // Pick a random number between 0 and the amount of reasons we have
            const randomIndex = Math.floor(Math.random() * reasons.length);
            
            // Update the text on the screen
            display.innerText = reasons[randomIndex];
            
            // Add a little pop animation when the text changes
            display.style.transform = 'scale(1.1)';
            setTimeout(() => {
                display.style.transform = 'scale(1)';
            }, 200);
        }

        function createEmojiShower() {
            const emojis = ['💖', '😸', '🗽', '✨', '🌸']; 
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.classList.add('falling-emoji');
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    el.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    document.body.appendChild(el);
                    
                    setTimeout(() => { el.remove(); }, 6000);
                }, i * 100); 
            }
        }
    </script>
</body>
</html>
